AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  東京都の気象データ収集アプリ（バックエンド）
  フェーズ①: DynamoDB + Collector Lambda + EventBridge Scheduler
  フェーズ②: 閲覧API（HTTP API + API Lambda）

Parameters:
  AllowedOrigin:
    Type: String
    Default: http://localhost:5173
    Description: >
      CORSで許可するオリジン。フロントをCloudFrontに公開したら、
      sam deploy 時にこの値をCloudFrontのURLへ差し替える（コード変更不要）。

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - arm64
    Timeout: 120
    MemorySize: 256

Resources:

  # ==========================================================
  # データ保存先（DynamoDB）
  # ----------------------------------------------------------
  WeatherTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: WeatherObservations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ward
          AttributeType: S
        - AttributeName: datetime
          AttributeType: S
      KeySchema:
        - AttributeName: ward
          KeyType: HASH
        - AttributeName: datetime
          KeyType: RANGE

  # ==========================================================
  # 収集Lambda（Collector）
  # ==========================================================
  CollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: weather-collector
      CodeUri: src/collector/
      Handler: app.lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref WeatherTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WeatherTable
      Events:
        HourlySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: rate(1 hour)
            ScheduleExpressionTimezone: Asia/Tokyo

  # ==========================================================
  # 閲覧API の受付（API Gateway HTTP API）
  # ----------------------------------------------------------
  WeatherApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - "*"

  # ==========================================================
  # 閲覧Lambda（API）— 読み取り役
  # ----------------------------------------------------------
  # GET /wards         … 区の一覧（画面のセレクタ用）
  # GET /observations  … 指定区の観測データ（?ward=13109）
  # 1つの関数で2ルートを受け、関数側でパスを見て処理を振り分ける。
  # ==========================================================
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: weather-api
      CodeUri: src/api/
      Handler: app.lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref WeatherTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WeatherTable
      Events:
        WardsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeatherApi
            Method: GET
            Path: /wards
        ObservationsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeatherApi
            Method: GET
            Path: /observations

Outputs:
  WeatherTableName:
    Description: 作成されたDynamoDBテーブル名
    Value: !Ref WeatherTable
  CollectorFunctionName:
    Description: 収集Lambdaの関数名（手動実行の確認に使う）
    Value: !Ref CollectorFunction
  ApiBaseUrl:
    Description: 閲覧APIのベースURL（フロントのAPI接続先に使う）
    Value: !Sub "https://${WeatherApi}.execute-api.${AWS::Region}.amazonaws.com"