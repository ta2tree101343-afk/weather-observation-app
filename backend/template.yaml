AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  東京都の気象データ収集アプリ（バックエンド）

Parameters:
  AllowedOrigin:
    Type: String
    Default: http://localhost:5173
    Description: >
      CORSで許可するオリジン。フロントをCloudFrontに公開したら、
      sam deploy 時にこの値をCloudFrontのURLへ差し替える（コード変更不要）。

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - arm64
    Timeout: 120
    MemorySize: 256
    Tracing: Active

Resources:

  # SimpleTable は PK のみでソートキーを持てないため DynamoDB::Table を直接使う
  WeatherTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: WeatherObservations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ward
          AttributeType: S
        - AttributeName: datetime
          AttributeType: S
      KeySchema:
        - AttributeName: ward
          KeyType: HASH
        - AttributeName: datetime
          KeyType: RANGE

  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: weather-common
      ContentUri: src/layers/common/
      CompatibleRuntimes:
        - python3.13

  CollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: weather-collector
      Timeout: 420
      CodeUri: src/collector/
      Handler: app.lambda_handler
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          TABLE_NAME: !Ref WeatherTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WeatherTable
        - AWSXRayDaemonWriteAccess
      Events:
        HourlySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: rate(1 hour)
            ScheduleExpressionTimezone: Asia/Tokyo

  # HTTP API: REST API より安く、CORS（OPTIONS プリフライト含む）をゲートウェイ側で処理できる
  WeatherApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - "*"

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: weather-api
      CodeUri: src/api/
      Handler: app.lambda_handler
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          TABLE_NAME: !Ref WeatherTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WeatherTable
        - AWSXRayDaemonWriteAccess
      Events:
        WardsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeatherApi
            Method: GET
            Path: /wards
        ObservationsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeatherApi
            Method: GET
            Path: /observations

  CollectorPartialFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: weather-collector-partial-failure
      AlarmDescription: Collector Lambda で一部の区のデータ取得に失敗しました
      MetricName: FailedWardsCount
      Namespace: WeatherApp
      Dimensions:
        - Name: service
          Value: weather-collector
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  # S3 は非公開のまま CloudFront OAC 経由でのみ読ませる（直アクセス不可）
  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: weather-web-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        DefaultRootObject: index.html
        Origins:
          - Id: WebBucketOrigin
            DomainName: !GetAtt WebBucket.RegionalDomainName
            OriginAccessControlId: !Ref WebOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: WebBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # AWS管理 CachingOptimized
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebDistribution}"

Outputs:
  WeatherTableName:
    Description: 作成されたDynamoDBテーブル名
    Value: !Ref WeatherTable
  CollectorFunctionName:
    Description: 収集Lambdaの関数名（手動実行の確認に使う）
    Value: !Ref CollectorFunction
  ApiBaseUrl:
    Description: 閲覧APIのベースURL（フロントのAPI接続先に使う）
    Value: !Sub "https://${WeatherApi}.execute-api.${AWS::Region}.amazonaws.com"
  WebBucketName:
    Description: フロント配信用S3バケット名（aws s3 sync の宛先）
    Value: !Ref WebBucket
  WebURL:
    Description: 公開URL（CloudFront）
    Value: !Sub "https://${WebDistribution.DomainName}"
  WebDistributionId:
    Description: CloudFrontディストリビューションID（キャッシュ無効化に使う）
    Value: !Ref WebDistribution