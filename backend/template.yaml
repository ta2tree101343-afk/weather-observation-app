AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  東京都の気象データ収集アプリ（バックエンド）
  フェーズ①: DynamoDB + Collector Lambda + EventBridge Scheduler
  フェーズ②: 閲覧API（HTTP API + API Lambda）

Parameters:
  AllowedOrigin:
    Type: String
    Default: http://localhost:5173
    Description: >
      CORSで許可するオリジン。フロントをCloudFrontに公開したら、
      sam deploy 時にこの値をCloudFrontのURLへ差し替える（コード変更不要）。

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - arm64
    Timeout: 120
    MemorySize: 256
    Tracing: Active

Resources:

  # ==========================================================
  # データ保存先（DynamoDB）
  # ----------------------------------------------------------
  # SAMの SimpleTable は「PKのみ」でソートキーを持てないため、
  # 複合キー(PK=区, SK=日時)が必要な今回は DynamoDB::Table を直接使う。
  # ==========================================================
  WeatherTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: WeatherObservations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ward
          AttributeType: S
        - AttributeName: datetime
          AttributeType: S
      KeySchema:
        - AttributeName: ward
          KeyType: HASH
        - AttributeName: datetime
          KeyType: RANGE

  # ==========================================================
  # 共有Layer（共通コードの置き場）
  # ----------------------------------------------------------
  # wards.py（23区の対応表）を1か所にまとめ、収集・閲覧の両Lambdaから使う。
  # ContentUri配下の python/ の中身が、各Lambdaで import 可能になる。
  # （src/layers/common/python/wards.py → どちらも from wards import WARDS）
  # ==========================================================
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: weather-common
      ContentUri: src/layers/common/
      CompatibleRuntimes:
        - python3.13

  # ==========================================================
  # 収集Lambda（Collector）— 書き込み役
  # ==========================================================
  CollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: weather-collector
      Timeout: 420
      CodeUri: src/collector/
      Handler: app.lambda_handler
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          TABLE_NAME: !Ref WeatherTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WeatherTable
        - AWSXRayDaemonWriteAccess
      Events:
        HourlySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: rate(1 hour)
            ScheduleExpressionTimezone: Asia/Tokyo

  # ==========================================================
  # 閲覧API の受付（API Gateway HTTP API）
  # ----------------------------------------------------------
  # HTTP APIはREST APIより安く、CORSをゲートウェイ側で自動処理してくれる。
  # ブラウザのプリフライト(OPTIONS)もここが面倒を見る。
  # ==========================================================
  WeatherApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - "*"

  # ==========================================================
  # 閲覧Lambda（API）— 読み取り役
  # ----------------------------------------------------------
  # GET /wards         … 区の一覧（画面のセレクタ用）
  # GET /observations  … 指定区の観測データ（?ward=13109）
  # 1つの関数で2ルートを受け、関数側でパスを見て処理を振り分ける。
  # ==========================================================
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: weather-api
      CodeUri: src/api/
      Handler: app.lambda_handler
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          TABLE_NAME: !Ref WeatherTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WeatherTable
        - AWSXRayDaemonWriteAccess
      Events:
        WardsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeatherApi
            Method: GET
            Path: /wards
        ObservationsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeatherApi
            Method: GET
            Path: /observations

  # ==========================================================
  # アラート（Collector 部分失敗の検知）
  # ----------------------------------------------------------
  # FailedWardsCount > 0 のとき ALARM 状態になる。
  # AlarmActions に SNS トピックの ARN を追加すると通知できる。
  # ==========================================================
  CollectorPartialFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: weather-collector-partial-failure
      AlarmDescription: Collector Lambda で一部の区のデータ取得に失敗しました
      MetricName: FailedWardsCount
      Namespace: WeatherApp
      Dimensions:
        - Name: service
          Value: weather-collector
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  # ==========================================================
  # フロント配信（S3 + CloudFront）
  # ----------------------------------------------------------
  # ビルド済みフロント(dist)をS3に置き、CloudFront経由で配信する。
  # S3は非公開のままにし、CloudFrontからのみ OAC で読ませる（直アクセス不可）。
  # ==========================================================
  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: weather-web-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        DefaultRootObject: index.html
        Origins:
          - Id: WebBucketOrigin
            DomainName: !GetAtt WebBucket.RegionalDomainName
            OriginAccessControlId: !Ref WebOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: WebBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # AWS管理 CachingOptimized
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebDistribution}"

Outputs:
  WeatherTableName:
    Description: 作成されたDynamoDBテーブル名
    Value: !Ref WeatherTable
  CollectorFunctionName:
    Description: 収集Lambdaの関数名（手動実行の確認に使う）
    Value: !Ref CollectorFunction
  ApiBaseUrl:
    Description: 閲覧APIのベースURL（フロントのAPI接続先に使う）
    Value: !Sub "https://${WeatherApi}.execute-api.${AWS::Region}.amazonaws.com"
  WebBucketName:
    Description: フロント配信用S3バケット名（aws s3 sync の宛先）
    Value: !Ref WebBucket
  WebURL:
    Description: 公開URL（CloudFront）
    Value: !Sub "https://${WebDistribution.DomainName}"
  WebDistributionId:
    Description: CloudFrontディストリビューションID（キャッシュ無効化に使う）
    Value: !Ref WebDistribution